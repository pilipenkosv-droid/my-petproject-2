name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint, Type Check, Test, Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      NEXT_PUBLIC_SUPABASE_URL: "https://test.supabase.co"
      NEXT_PUBLIC_SUPABASE_ANON_KEY: "test-anon-key"
      SUPABASE_SERVICE_ROLE_KEY: "test-service-role-key"
      LAVA_API_KEY: "test-lava-key"
      LAVA_WEBHOOK_LOGIN: "webhook_user"
      LAVA_WEBHOOK_PASSWORD: "webhook_pass"
      BOT_API_URL: "https://bot.test.com"
      BOT_ADMIN_API_KEY: "test-bot-key"
      NEXT_PUBLIC_SITE_URL: "https://diplox.online"
      RESEND_API_KEY: "test-resend-key"
      EMAIL_FROM: "test@diplox.online"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit + Integration tests
        run: npm run test:ci

      - name: Build
        run: npm run build
